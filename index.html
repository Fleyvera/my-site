<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Felipe Martelo — Game Developer, portfolio interativo e site profissional.">
  <meta name="theme-color" content="#0f0f12">
  <title>Felipe Martelo</title>
  <link rel="icon" href="/assets/img/MeHead-icon-64.png" type="image/png" sizes="64x64">
  <link rel="icon" href="/assets/img/MeHead-icon-48.png" type="image/png" sizes="48x48">
  <link rel="icon" href="/assets/img/MeHead-icon.png" type="image/png" sizes="32x32">
  <style>
    :root { color-scheme: dark; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0f0f12;
      color: #ececf0;
      font-family: Inter, system-ui, sans-serif;
    }
    .gate {
      text-align: center;
      padding: 2rem;
    }
    .gate a { color: #c9b896; }
  </style>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);

      if (params.get("site") === "1") {
        window.location.replace("/site/");
        return;
      }

      if (params.get("game") === "1") {
        window.location.replace("/game/");
        return;
      }

      var isMobile = window.matchMedia("(max-width: 768px), (pointer: coarse)").matches;

      if (isMobile) {
        window.location.replace("/site/");
        return;
      }

      window.location.replace("/game/");
    })();
  </script>
</head>
<body>
  <div class="gate">
    <p>Carregando…</p>
    <p>
      <a href="/game/">Portfolio interativo</a>
      ·
      <a href="/site/">Site</a>
    </p>
  </div>
</body>
</html>
